<script>
const IS_ACTIVE = false;
let curP = 1;
function updateStatus(){
const r = document.documentElement;
const c = document.getElementById('comm-status');
const cd = document.getElementById('comm-status-display');
if(IS_ACTIVE){
if(c) c.innerText = "STATUS: ONLINE";
if(cd) { cd.innerText = "ONLINE"; cd.style.color = "var(--rblx)"; }
r.style.setProperty('--status-clr','var(--rblx)');
} else {
if(c) c.innerText = "STATUS: OFFLINE";
if(cd) { cd.innerText = "OFFLINE"; cd.style.color = "var(--error)"; }
r.style.setProperty('--status-clr','var(--error)');
}
}
function updateGermanyTime() {
const options = {timeZone: 'Europe/Berlin',hour: '2-digit',minute: '2-digit',second: '2-digit',hour12: false};
const formatter = new Intl.DateTimeFormat([], options);
const timeElement = document.getElementById('germany-time');
if (timeElement) {timeElement.innerHTML = formatter.format(new Date()) + " GER";}
}
function updateNavHighlight(n) {
document.querySelectorAll('.nav-node').forEach(d => d.classList.remove('active'));
const activeDot = document.getElementById('dot-'+n);
if(activeDot) activeDot.classList.add('active');
}
function sTP(n){
curP = n;
const t=document.getElementById("page"+n);
if(t) {t.scrollIntoView({behavior:"instant"});updateNavHighlight(n);}
}
function randomizeProcessHex() {
const hexElements = document.querySelectorAll('.step-hex');
const chars = '0123456789ABCDEF';
hexElements.forEach(el => {
let res = "";
for(let i=0; i<4; i++) res += chars[Math.floor(Math.random()*16)];
el.innerText = res;
});
}
const observerOptions = { threshold: 0.5 };
const observer = new IntersectionObserver((entries) => {
entries.forEach(entry => {
if (entry.isIntersecting) {
const pageId = parseInt(entry.target.id.replace('page', ''));
curP = pageId;
updateNavHighlight(pageId);
}
});
}, observerOptions);
function cpV(t,y){navigator.clipboard.writeText(t).then(()=>{sT(y+" Copied")})}
function sT(m){
const c=document.getElementById('toast-container'), t=document.createElement('div');
t.className='toast show'; t.innerText=m; c.appendChild(t);
setTimeout(()=>{t.remove()},3000);
}
function toggleDropdown(element) { element.classList.toggle('expanded'); }
